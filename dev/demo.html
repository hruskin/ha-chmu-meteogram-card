<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>ČHMÚ Meteogram Card — demo</title>
<style>
  body { background: #eceff1; font-family: Roboto, sans-serif; padding: 24px; margin: 0; }
  .wrap { max-width: 520px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
  ha-card { display: block; background: #fff; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,.18); }
</style>
</head>
<body>
<div class="wrap">
  <chmu-meteogram-card id="card48"></chmu-meteogram-card>
  <chmu-meteogram-card id="card12"></chmu-meteogram-card>
</div>
<script type="module">
import "../dist/chmu-meteogram-card.js";

// Stub ha-icon (v HA ho dodává frontend) — pro demo emoji náhrada
if (!customElements.get("ha-icon")) {
  customElements.define("ha-icon", class extends HTMLElement {
    static get observedAttributes() { return ["icon"]; }
    attributeChangedCallback() { this._render(); }
    connectedCallback() { this._render(); }
    _render() {
      const map = {
        "mdi:weather-sunny": "☀️", "mdi:weather-night": "🌙",
        "mdi:weather-partly-cloudy": "⛅", "mdi:weather-cloudy": "☁️",
        "mdi:weather-rainy": "🌧️", "mdi:weather-pouring": "🌧️",
        "mdi:weather-snowy": "🌨️", "mdi:weather-windy": "💨",
        "mdi:water": "💧", "mdi:arrow-up": "↑",
        "mdi:gauge": "◔", "mdi:water-percent": "💦",
      };
      this.textContent = map[this.getAttribute("icon")] ?? "·";
    }
  });
}

// Mock: 73 hodinových bodů à la ČHMÚ ALADIN
const start = new Date();
start.setMinutes(0, 0, 0);
start.setHours(start.getHours() - 1);
const forecast = [];
for (let i = 0; i < 73; i++) {
  const t = new Date(start.getTime() + i * 3600e3);
  const h = t.getHours();
  const temp = 12 + 6 * Math.sin(((h - 14) / 24) * 2 * Math.PI) + 2 * Math.sin(i / 11);
  let precip = 0;
  if (i > 18 && i < 26) precip = Math.max(0, 2.2 * Math.sin(((i - 18) / 8) * Math.PI));
  if (i > 50 && i < 55) precip = 0.4;
  const clouds = 50 + 45 * Math.sin(i / 7);
  const condition =
    precip >= 2 ? "pouring" :
    precip >= 0.1 ? "rainy" :
    clouds >= 80 ? "cloudy" :
    clouds >= 30 ? "partlycloudy" :
    h >= 6 && h <= 20 ? "sunny" : "clear-night";
  forecast.push({
    datetime: t.toISOString(),
    condition,
    temperature: Math.round(temp * 10) / 10,
    precipitation: Math.round(precip * 10) / 10,
    wind_speed: Math.round((2 + 2 * Math.sin(i / 5)) * 10) / 10,
    wind_gust_speed: Math.round((3.5 + 2.5 * Math.sin(i / 5)) * 10) / 10,
    wind_bearing: (i * 17) % 360,
    pressure: Math.round((1018 + 3 * Math.sin(i / 13)) * 10) / 10,
    humidity: Math.round(75 + 20 * Math.sin(i / 9)),
  });
}

const hass = {
  locale: { language: "cs" },
  states: {
    "weather.chmu_praha_predpoved": {
      attributes: {
        friendly_name: "ČHMÚ Praha-Libuš — předpověď",
        temperature_unit: "°C",
        precipitation_unit: "mm",
        wind_speed_unit: "m/s",
        pressure_unit: "hPa",
      },
    },
  },
  connection: {
    subscribeMessage: (cb) => {
      setTimeout(() => cb({ type: "hourly", forecast }), 50);
      return Promise.resolve(async () => {});
    },
  },
};

for (const [id, cfg] of [
  ["card48", { hours: 48 }],
  ["card12", { hours: 12, title: "Dnes (12 h)" }],
]) {
  const card = document.getElementById(id);
  card.setConfig({
    type: "custom:chmu-meteogram-card",
    entity: "weather.chmu_praha_predpoved",
    ...cfg,
  });
  card.hass = hass;
}
</script>
</body>
</html>
