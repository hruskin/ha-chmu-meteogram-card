<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>ČHMÚ Meteogram Card — demo</title>
<style>
  body { background: #eceff1; font-family: Roboto, sans-serif; padding: 24px; margin: 0; }
  .wrap { max-width: 520px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
  ha-card { display: block; background: #fff; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,.18); }
</style>
</head>
<body>
<div class="wrap">
  <chmu-meteogram-card id="card48"></chmu-meteogram-card>
  <chmu-meteogram-card id="card12"></chmu-meteogram-card>
</div>
<script type="module">
import "../dist/chmu-meteogram-card.js";

// Mock: 73 hodinových bodů à la ČHMÚ ALADIN
const start = new Date();
start.setMinutes(0, 0, 0);
start.setHours(start.getHours() - 1);
const forecast = [];
for (let i = 0; i < 73; i++) {
  const t = new Date(start.getTime() + i * 3600e3);
  const h = t.getHours();
  const temp = 12 + 6 * Math.sin(((h - 14) / 24) * 2 * Math.PI) + 2 * Math.sin(i / 11);
  let precip = 0;
  if (i > 18 && i < 26) precip = Math.max(0, 2.2 * Math.sin(((i - 18) / 8) * Math.PI));
  if (i > 50 && i < 55) precip = 0.4;
  forecast.push({
    datetime: t.toISOString(),
    temperature: Math.round(temp * 10) / 10,
    precipitation: Math.round(precip * 10) / 10,
  });
}

const hass = {
  locale: { language: "cs" },
  states: {
    "weather.chmu_praha_predpoved": {
      attributes: {
        friendly_name: "ČHMÚ Praha-Libuš — předpověď",
        temperature_unit: "°C",
        precipitation_unit: "mm",
      },
    },
  },
  connection: {
    subscribeMessage: (cb) => {
      setTimeout(() => cb({ type: "hourly", forecast }), 50);
      return Promise.resolve(async () => {});
    },
  },
};

for (const [id, cfg] of [
  ["card48", { hours: 48 }],
  ["card12", { hours: 12, title: "Dnes (12 h)" }],
]) {
  const card = document.getElementById(id);
  card.setConfig({
    type: "custom:chmu-meteogram-card",
    entity: "weather.chmu_praha_predpoved",
    ...cfg,
  });
  card.hass = hass;
}
</script>
</body>
</html>
